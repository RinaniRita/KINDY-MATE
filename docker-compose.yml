version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kindy_mate_db
    environment:
      POSTGRES_DB: kindy_mate_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecurepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kindy_mate_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
